# Nixpacks config for Railway deployment
# Playwright needs system-level browser dependencies

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]
aptPkgs = [
  "libnss3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2t64",
  "libnspr4",
  "libglib2.0-0",
  "libdbus-1-3",
  "libexpat1",
  "libxcb1",
  "libx11-6",
  "libx11-xcb1",
  "libxext6",
  "fonts-liberation",
  "fonts-noto-color-emoji"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"
